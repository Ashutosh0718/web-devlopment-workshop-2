0<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA V - Welcome to Los Santos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:black;
    color:white;
}


header{
    position:fixed;
    width:100%;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    z-index:1000;
}

.logo{
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:30px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

nav ul li a:hover{
    color:#00ff99;
}

/* HERO SECTION */
.hero{
    height:100vh;
    background:url('https://images.alphacoders.com/633/633151.jpg') no-repeat center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.content{
    position:relative;
    z-index:2;
}

.content h1{
    font-size:60px;
    text-transform:uppercase;
}

.content p{
    margin:20px 0;
    font-size:20px;
}

.btn{
    padding:12px 30px;
    background:#00ff99;
    color:black;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:white;
}


.characters{
    padding:100px 50px;
    text-align:center;
    background:#111;
}

.characters h2{
    font-size:40px;
    margin-bottom:50px;
}

.card-container{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.card{
    background:#222;
    padding:20px;
    border-radius:10px;
    width:250px;
    transition:0.3s;
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin-top:15px;
}

.card:hover{
    transform:scale(1.05);
}


footer{
    text-align:center;
    padding:20px;
    background:black;
    font-size:14px;
    color:gray;
}
</style>

</head>
<body>

<header>
    <div class="logo">GTA V</div>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Story</a></li>
            <li><a href="#">Characters</a></li>
            <li><a href="#">Download</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="overlay"></div>
    <div class="content">
        <h1>Welcome to Los Santos</h1>
        <p>Experience the ultimate open-world action adventure.</p>
        <a href="#" class="btn">Download Now</a>
    </div>
</section>

<section class="characters">
    <h2>Main Characters</h2>
    <div class="card-container">
